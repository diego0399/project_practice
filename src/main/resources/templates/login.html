<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .card {
            background: white;
            padding: 24px;
            border-radius: 12px;
            width: 320px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }
        input {
            width: 100%;
            padding: 10px;
            margin-top: 6px;
            margin-bottom: 14px;
            border: 1px solid #ccc;
            border-radius: 8px;
        }
        button {
            width: 100%;
            padding: 10px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
        .error {
            color: #dc2626;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
<div class="card">
    <h2>Iniciar sesión</h2>

    <form th:action="@{/login}" th:object="${usuario}" method="post">
        <label>Usuario</label>
        <input type="text" th:field="*{login}" required />

        <label>Contraseña</label>
        <input type="password" th:field="*{pass}" required />

        <button type="submit">Entrar</button>
    </form>
</div>

<script th:if="${mensaje}">
    alert('[[${mensaje}]]');
</script>
</body>
</html>
